name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create libs directory
        run: mkdir -p app/libs

      - name: Download Spotify App Remote SDK
        run: |
          curl -sL "https://github.com/nicbarker/spotify-android-sdk-mirror/raw/refs/heads/main/spotify-app-remote-release-0.8.0.aar" \
            -o app/libs/spotify-app-remote-release-0.8.0.aar || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: underscore-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
